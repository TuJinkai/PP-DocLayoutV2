version: '3.8'

services:
  paddleocr-vl-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: acckuss/paddleocr-vl-api:latest
    container_name: paddleocr-vl-api
    ports:
      - "5001:5001"
    volumes:
      # 挂载本地模型目录到容器内 /app/models/PP-DocLayoutV2
      - /path/to/PP-DocLayoutV2:/app/models/PP-DocLayoutV2:ro
    environment:
      - VL_REC_SERVER_URL=${VL_REC_SERVER_URL}
      - VL_REC_API_KEY=${VL_REC_API_KEY}
      - VL_REC_API_MODEL_NAME=${VL_REC_API_MODEL_NAME:-PaddleOCR-VL-0.9B}
      - DOCLAYOUT_MODEL_DIR=/app/models/PP-DocLayoutV2
      - PORT=5001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
