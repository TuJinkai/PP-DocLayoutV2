name: Build ARM Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'api.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/build-arm.yml'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MODEL_DIR: PP-DocLayoutV2

jobs:
  build-arm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate version number
        id: version
        run: |
          # Format: v1.0.YYYYMMDD-shortsha (e.g., v1.0.20260422-a1b2c3d)
          DATE=$(date +%Y%m%d)
          SHA=$(git rev-parse --short HEAD)
          VERSION="v1.0.${DATE}-${SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download PP-DocLayoutV2 model
        run: |
          pip install modelscope
          python -c "
          from modelscope import snapshot_download
          import os
          import shutil

          downloaded_path = snapshot_download(
              'PaddlePaddle/PP-DocLayoutV2',
              cache_dir='./model_cache',
              revision='master'
          )
          target_dir = '${{ env.MODEL_DIR }}'
          if os.path.exists(target_dir):
              shutil.rmtree(target_dir)
          shutil.copytree(downloaded_path, target_dir)
          print(f'Model ready at: {target_dir}')
          print('Files:', os.listdir(target_dir))
          "

      - name: Build and push Docker image for ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            version=${{ steps.version.outputs.version }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull command:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY